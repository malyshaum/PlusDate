# Run nginx fully in unprivileged mode.
pid /tmp/nginx.pid;

# Events block configures worker process connections
events {
    # Maximum number of simultaneous connections per worker process
    worker_connections 1024;
}

# Main HTTP configuration block
http {
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    # Include MIME type mappings (tells browser what type each file extension is)
    include /etc/nginx/mime.types;

    # Default MIME type for files with unknown extensions
    default_type application/octet-stream;

    # Enable efficient file transfer (uses OS kernel sendfile instead of reading to buffer)
    sendfile on;

    # How long to keep connections alive (in seconds)
    keepalive_timeout 65;

    # Virtual server configuration
    server {
        # Listen on port 8080 (HTTP)
        listen 8080;

        # Server name (localhost for local/Docker environments)
        server_name localhost;

        # Root directory where static files are served from
        root /usr/share/nginx/html;

        # Default file to serve when accessing a directory
        index index.html;

        # Location block 1: Handle index.html specifically (NEVER cache)
        # This must ALWAYS be fetched fresh to ensure users get latest app version
        location = /index.html {
            # no-store: Don't store in cache at all
            # no-cache: Must revalidate with server before using cached version
            # must-revalidate: Once stale, must check with server before reuse
            # proxy-revalidate: Same as must-revalidate but for shared caches
            # max-age=0: Consider cached version stale immediately
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

            # Legacy HTTP/1.0 cache control (for old browsers)
            add_header Pragma "no-cache" always;

            # Set expiration date to past (forces immediate expiration)
            add_header Expires "0" always;

            # Disable ETag validation (don't use file modification tags for caching)
            etag off;

            # Ignore If-Modified-Since header from client (always serve fresh)
            if_modified_since off;

            # Try to serve the file, fallback to index.html (for SPA routing)
            try_files $uri /index.html;
        }

        # Location block 2: Handle Vite-generated assets with content hashes (CACHE AGGRESSIVELY)
        # These files have unique hashes in filenames (e.g., main.a3f2b1c.js)
        # When code changes, filename changes, so safe to cache forever
        location ^~ /assets/ {
            # public: Can be cached by any cache (browser, CDN, proxy)
            # max-age=31536000: Cache for 1 year (31536000 seconds)
            # immutable: File will never change, don't revalidate even on refresh
            add_header Cache-Control "public, max-age=31536000, immutable" always;

            # Alternative expiration syntax (1 year from now)
            expires 1y;

            # Enable ETag for additional validation (uses file modification time/size)
            etag on;

            # Try to serve the file, return 404 if not found
            try_files $uri =404;
        }

        # Location block 3: Handle images and fonts (MODERATE CACHING - 30 days)
        # These might not have content hashes, so use shorter cache time
        # ~* means case-insensitive regex match
        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
            # public: Can be cached by any cache
            # max-age=2592000: Cache for 30 days (2592000 seconds)
            add_header Cache-Control "public, max-age=2592000" always;

            # Alternative expiration syntax (30 days from now)
            expires 30d;

            # Enable ETag for cache validation
            etag on;

            # Don't log access to these files (reduces log size)
            access_log off;
        }

        # Location block 4: Catch-all for SPA routing (NO CACHE)
        # Handles all other routes and redirects to index.html for client-side routing
        location / {
            # Same as index.html - never cache routes
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;

            # Try file, then directory, then fallback to index.html for SPA routing
            # This allows React Router to handle the route on client side
            try_files $uri $uri/ /index.html;
        }

        # Security header: Prevent MIME type sniffing (browser must trust server's content-type)
        add_header X-Content-Type-Options nosniff;

        # Security header: Enable XSS filter in browser (blocks detected XSS attacks)
        add_header X-XSS-Protection "1; mode=block";

        # Content Security Policy: Controls which origins can be used for various resource types
        # frame-ancestors: Allows embedding only from Telegram domains
        # connect-src: Allows AJAX/WebSocket connections to listed origins (your API endpoints)
        add_header Content-Security-Policy "frame-ancestors https://web.telegram.org https://tg.telegram.org https://*.telegram.org; connect-src 'self' https://api-production-8f1b.up.railway.app https://plusdate-stage.up.railway.app wss://ws.stage.plus.date wss://ws.plus.date https://bucket-production-1d21.up.railway.app;";

        # Referrer Policy: Send full referrer for same-origin, only origin for cross-origin HTTPS
        add_header Referrer-Policy "strict-origin-when-cross-origin";
    }
}
