<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Offline</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        -webkit-tap-highlight-color: transparent;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: #000;
        color: #fff;
      }
      .container {
        text-align: center;
        padding: 16px;
        width: 100%;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 8px;
      }
      p {
        margin: 0 0 16px;
        font-size: 14px;
        color: #d0d0d0;
      }
      button {
        border-radius: 999px;
        border: none;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        background: #ff5a7a;
        color: #fff;
        cursor: pointer;
        outline: none;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
      }
      button:focus {
        outline: none;
      }
      button:focus-visible {
        outline: 2px solid rgba(255, 90, 122, 0.9);
        outline-offset: 3px;
      }
      button:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Вы офлайн</h1>
      <p>Проверьте подключение к интернету.</p>
      <button type="button" onclick="window.location.reload()">Перезагрузить</button>
    </div>
  </body>
</html>
