services:
    api:
        build: .
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        volumes:
            -   app_storage:/var/www/storage/app
        ports:
            - "8000:8000"
            - "8080:8080"
        env_file:
            - .env
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "--fail", "http://127.0.0.1:8000/api/healthcheck"]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 30s
        networks:
            - backend

    postgres:
        image: postgis/postgis:15-3.4
        container_name: postgresql
        build: ./docker/database
        environment:
            POSTGRES_USER: ${POSTGRES_SUPERUSER}
            POSTGRES_PASSWORD: ${POSTGRES_SUPERUSER_PASSWORD}
            POSTGRES_DB: ${DB_DATABASE}
            DB_USERNAME: ${DB_USERNAME}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_READ_USERNAME: ${DB_READ_USERNAME}
            DB_READ_PASSWORD: ${DB_READ_PASSWORD}
            DB_WRITE_USERNAME: ${DB_WRITE_USERNAME}
            DB_WRITE_PASSWORD: ${DB_WRITE_PASSWORD}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        ports:
            - "5432:5432"
        restart: unless-stopped
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-postgres} -d ${DB_DATABASE}"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - backend

    redis:
        image: redis:7-alpine
        container_name: redis
        ports:
            - "6379:6379"
        volumes:
            - redis_data:/data
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - backend

    minio:
        image: minio/minio:RELEASE.2024-01-16T16-07-38Z
        container_name: minio
        ports:
            - "9000:9000"
            - "9001:9001"
        volumes:
            - minio_data:/data
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
        command: server /data --console-address ":9001"
        restart: unless-stopped
        networks:
            - backend

volumes:
    app_storage:
    postgres_data:
    redis_data:
    minio_data:

networks:
    backend:
        driver: bridge
